name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests with coverage gate
        run: |
          pytest --cov=evaluation_introspection_agents --cov-report=term-missing --cov-report=xml --cov-fail-under=90

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml

      - name: Run demo smoke tests
        run: |
          python demos/introspection_demo.py
          python demos/critic_demo.py
          python demos/improvement_demo.py
          python demos/full_feedback_loop_demo.py

      - name: Run CLI smoke test
        run: |
          evaluation-agents run examples/planning_task.json
          evaluation-agents run examples/robotics_decision.json --json

      - name: Run benchmark harness
        run: python benchmarks/run_benchmark.py
